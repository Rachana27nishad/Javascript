    <script>


        const cups = 41;
        switch (cups) {
            case 4:
                console.log(" This value of cus is 4 ")

            //break;

                console.log(" This value of cus is 41")

            //break;
            case 45:
                console.log(" This value of cus is 45  ")

            //break;
            case 46:
                console.log(" This value of cus is  46")

            //break;
            case 49:
                console.log(" This value of cus is 49 ")

            //break;
            case 42:
                console.log(" This value of cus is 42 ")

            //break;
            case 47:
                console.log(" This value of cus is 47 ")

            //break;

            default:
                console.log("This value of cups none of 42 49 43")
            //break;
        }



    </script>
