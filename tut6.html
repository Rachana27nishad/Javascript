<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>variable use</h2>
    <p>redeclaring a javascript variable with <b>var</b> is :</p>

    <p id="demo"></p>

    <script>


        var x = 2;
        // x is 2


        var x = 3;
        // now x is 3

        document.getElementById("demo").innerHTML = x;


    </script>
</body>

</html>
