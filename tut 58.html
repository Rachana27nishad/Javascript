<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set time</title>
</head>
<body>
    <div class="container">
this is a container
    </div>

    <script>
        console.log("this is a tutorial");
    //  setTimeout --= Allows us to run the function once after the interval of time    
    //  clearTimeout --= Allows us to run the function repeatedly after the interval of time    
    
    function greet(name) {
console.log("hello good morning" , name);
    }
    // greet()
    
    setTimeout (greet,5000);

    
    
    
    </script>


</body>
</html>
